      datasource_name: parquet_datasource
      data_asset_name: merged_parquet_asset
      options: {}
      batch_slice:
    expectation_suite_name: icetex_macro_suite
profilers: []
ge_cloud_id:
expectation_suite_ge_cloud_id:
